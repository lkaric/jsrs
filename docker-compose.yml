services:
  db:
    image: postgres:17-alpine
    container_name: db
    environment:
      POSTGRES_USER: jsrs
      POSTGRES_PASSWORD: jsrs_dev_password
      POSTGRES_DB: jsrs_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jsrs -d jsrs_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
